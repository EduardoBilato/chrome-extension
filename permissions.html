<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meet Recorder — Microphone Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .card { max-width: 420px; }
    h1 { font-size: 20px; margin-bottom: 12px; }
    p { font-size: 14px; color: #a6adc8; line-height: 1.7; }
    .success { color: #a6e3a1; font-size: 18px; font-weight: 600; }
    .error-msg { color: #f38ba8; margin-top: 12px; }
    code {
      background: #313244;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="content">
      <h1>🎙 Microphone Access</h1>
      <p>Chrome will ask for microphone permission.<br>
         Click <strong>Allow</strong> in the dialog to enable recording.<br>
         <em>This is a one-time setup.</em></p>
    </div>
  </div>
  <script>
    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(stream => {
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('content').innerHTML =
          '<p class="success">✓ Microphone access granted!</p>' +
          '<p style="margin-top:12px">You can close this tab, go back to your Google Meet, and click the Meet Recorder icon to start recording.</p>';
        setTimeout(() => window.close(), 2500);
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<h1>Access not granted</h1>' +
          '<p class="error-msg">' + err.message + '</p>' +
          '<p style="margin-top:12px">To fix this, open <code>chrome://settings/content/microphone</code> and make sure this extension is allowed.</p>';
      });
  </script>
</body>
</html>
